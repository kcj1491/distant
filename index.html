<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>등부표 이출거리 확인 앱</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>등부표 이출거리 확인</h1>
      <p>기준 위치와 현재 위치를 입력하면 이출거리와 방위각을 계산합니다.</p>
    </header>

    <section class="card">
      <h2>등부표 정보</h2>

      <label>
        등부표 이름
        <input type="text" id="buoyName" placeholder="예: A-12 등부표" />
      </label>

      <label>
        허용 이출거리
        <div class="inline-input">
          <input type="number" id="limitDistance" value="50" min="0" />
          <span>m</span>
        </div>
      </label>
    </section>

    <section class="grid">
      <div class="card">
        <h2>기준 위치</h2>

        <label>
          기준 위도
          <input type="number" id="baseLat" step="0.000001" placeholder="예: 35.123456" />
        </label>

        <label>
          기준 경도
          <input type="number" id="baseLon" step="0.000001" placeholder="예: 129.123456" />
        </label>
      </div>

      <div class="card">
        <h2>현재 위치</h2>

        <label>
          현재 위도
          <input type="number" id="currentLat" step="0.000001" placeholder="예: 35.123900" />
        </label>

        <label>
          현재 경도
          <input type="number" id="currentLon" step="0.000001" placeholder="예: 129.124100" />
        </label>
      </div>
    </section>

    <section class="button-area">
      <button id="calculateBtn">이출거리 계산</button>
      <button id="sampleBtn" class="secondary">예시값 입력</button>
      <button id="resetBtn" class="danger">초기화</button>
    </section>

    <section class="result-card" id="resultBox">
      <h2>계산 결과</h2>

      <div class="result-grid">
        <div>
          <span>이출거리</span>
          <strong id="distanceMeter">-</strong>
        </div>

        <div>
          <span>해리 환산</span>
          <strong id="distanceNm">-</strong>
        </div>

        <div>
          <span>방위각</span>
          <strong id="bearing">-</strong>
        </div>

        <div>
          <span>상태</span>
          <strong id="status">-</strong>
        </div>
      </div>

      <p id="message" class="message">좌표를 입력한 뒤 계산 버튼을 누르세요.</p>
    </section>

    <section class="card">
      <div class="history-title">
        <h2>최근 계산 기록</h2>
        <button id="clearHistoryBtn" class="small-danger">기록 삭제</button>
      </div>

      <ul id="historyList"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
